<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Louis Lamprecht</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230e0e0e'/%3E%3Ctext x='32' y='50' font-family='Georgia,serif' font-size='46' font-weight='300' fill='%23c8b99a' text-anchor='middle' letter-spacing='2'%3ELL%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080705; --surface: #111009; --card: #151310; --text: #e6ddd0;
    --muted: #7a6e62; --faint: #2a2520;
    --accent: oklch(0.70 0.09 58);
    --ff-display: 'Cormorant Garamond', serif;
    --ff-mono: 'Space Mono', monospace;
    --photo-cols: 3;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--ff-display); font-weight: 300; overflow-x: hidden; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 2rem 3.5rem; }
  nav::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,7,5,0.92) 0%, transparent 100%); pointer-events: none; }
  .nav-logo { text-decoration: none; display: flex; align-items: center; opacity: 0.92; transition: opacity 0.3s; }
  .nav-logo:hover { opacity: 1; }
  .nav-links { display: flex; gap: 2.8rem; list-style: none; position: relative; }
  .nav-links a { font-family: var(--ff-mono); font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--text); }

  /* GALLERY HEADER */
  .gallery-header { padding: 10rem 3.5rem 3rem; }
  .gallery-title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .gallery-sub { font-family: var(--ff-mono); font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }

  /* FILTERS */
  .photo-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0 3.5rem; margin-bottom: 2rem; }
  .photo-filter-btn { font-family: var(--ff-mono); font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); background: none; border: 1px solid var(--faint); padding: 0.5em 1.2em; cursor: pointer; transition: color 0.3s, border-color 0.3s; }
  .photo-filter-btn:hover { color: var(--text); border-color: var(--muted); }
  .photo-filter-btn.active { color: var(--accent); border-color: var(--accent); }

  /* PHOTO GRID */
  .photo-grid { display: grid; grid-template-columns: repeat(var(--photo-cols), 1fr); gap: 0.6rem; padding: 0 3.5rem; }
  .photo-item { position: relative; overflow: hidden; cursor: pointer; }
  .photo-item::after { content: ''; position: absolute; inset: 0; background: rgba(8,7,5,0); transition: background 0.4s ease; }
  .photo-item:hover::after { background: rgba(8,7,5,0.3); }
  .photo-item.tall { grid-row: span 2; }
  .photo-item.wide { grid-column: span 2; }
  .photo-img { width: 100%; height: 100%; min-height: 240px; object-fit: cover; display: block; transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94); }
  .photo-item:hover .photo-img { transform: scale(1.04); }
  .photo-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; background: linear-gradient(to top, rgba(8,7,5,0.85) 0%, transparent 100%); transform: translateY(100%); transition: transform 0.4s ease; z-index: 1; }
  .photo-item:hover .photo-caption { transform: translateY(0); }
  .photo-caption-title { font-family: var(--ff-mono); font-size: 0.58rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text); }
  .photo-caption-loc { font-size: 0.85rem; font-style: italic; color: var(--muted); margin-top: 0.25rem; }

  /* LIGHTBOX */
  #photo-lightbox { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(5,4,3,0.97); align-items: center; justify-content: center; }
  .plb-img { max-width: 90vw; max-height: 85vh; object-fit: contain; display: block; }
  .plb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: 1px solid var(--faint); color: var(--muted); font-size: 1.2rem; width: 48px; height: 48px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-family: var(--ff-mono); }
  .plb-nav:hover { border-color: var(--text); color: var(--text); }
  .plb-prev { left: 2rem; }
  .plb-next { right: 2rem; }
  .plb-close { position: absolute; top: 2rem; right: 2rem; background: none; border: none; color: var(--muted); font-size: 2rem; cursor: pointer; line-height: 1; }
  .plb-caption { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); font-family: var(--ff-mono); font-size: 0.55rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .plb-placeholder { width: min(800px,90vw); aspect-ratio: 4/3; background: var(--card); display: flex; align-items: center; justify-content: center; font-family: var(--ff-mono); font-size: 0.58rem; letter-spacing: 0.2em; color: var(--faint); text-transform: uppercase; }

  /* FOOTER */
  footer { display: flex; justify-content: space-between; align-items: center; padding: 3rem 3.5rem; border-top: 1px solid var(--faint); margin-top: 4rem; }
  .footer-copy { font-family: var(--ff-mono); font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); }

  /* MOBILE */
  .nav-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; position: relative; z-index: 101; }
  .nav-menu-btn span { display: block; width: 22px; height: 1px; background: var(--muted); margin: 5px 0; transition: all 0.3s; }
  .nav-mobile-overlay { display: none; position: fixed; inset: 0; z-index: 99; background: rgba(8,7,5,0.98); flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; }
  .nav-mobile-overlay.open { display: flex; }
  .nav-mobile-overlay a { font-family: var(--ff-mono); font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text); text-decoration: none; }
  @media (max-width: 768px) {
    nav { padding: 1.5rem 1.8rem; }
    .nav-links { display: none; }
    .nav-menu-btn { display: block; }
    .gallery-header { padding: 8rem 1.8rem 2rem; }
    .photo-filters { padding: 0 1.8rem; }
    .photo-grid { padding: 0 1.8rem; grid-template-columns: repeat(2, 1fr); }
    footer { padding: 2rem 1.8rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo" aria-label="Home"></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="films.html">Films</a></li>
    <li><a href="gallery.html" style="color:var(--text);">Photography</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <button class="nav-menu-btn" id="nav-menu-btn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="nav-mobile-overlay" id="nav-mobile-overlay">
  <a href="index.html" onclick="closeMobileNav()">Home</a>
  <a href="films.html">Films</a>
  <a href="gallery.html">Photography</a>
  <a href="projects.html">Projects</a>
  <a href="index.html#about" onclick="closeMobileNav()">About</a>
  <a href="index.html#contact" onclick="closeMobileNav()">Contact</a>
</div>

<div class="gallery-header">
  <h1 class="gallery-title">Photography</h1>
  <div class="gallery-sub" id="gallery-count"></div>
</div>

<div class="photo-filters" id="photo-filters"></div>
<div class="photo-grid" id="photo-grid"></div>

<footer>
  <span class="footer-copy" id="footer-name">&copy; 2026 Louis Lamprecht</span>
</footer>

<!-- PHOTO LIGHTBOX -->
<div id="photo-lightbox">
  <button class="plb-close" id="plb-close">&times;</button>
  <button class="plb-nav plb-prev" id="plb-prev">&#8592;</button>
  <img class="plb-img" id="plb-img" alt="" style="display:none">
  <div class="plb-placeholder" id="plb-placeholder" style="display:none">Photo placeholder</div>
  <button class="plb-nav plb-next" id="plb-next">&#8594;</button>
  <div class="plb-caption" id="plb-caption"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyCvcw4ItbhTG10cTVSQGJLoF74fjrKW1jc",
  authDomain:        "portfolio-3acbc.firebaseapp.com",
  projectId:         "portfolio-3acbc",
  storageBucket:     "portfolio-3acbc.firebasestorage.app",
  messagingSenderId: "869692298519",
  appId:             "1:869692298519:web:0de40d2458f5bdb5d35352"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC_REF = db.collection('portfolio').doc('main');
const LS_KEY = 'll_portfolio';

const DEFAULT_DATA = {
  info: { name: 'Louis Lamprecht', photoTags: [] },
  photos: []
};

function mergeWithDefaults(saved) {
  return {
    info:   { ...DEFAULT_DATA.info, ...(saved.info || {}) },
    photos: saved.photos || DEFAULT_DATA.photos
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      DOC_REF.get().then(doc => {
        if (doc.exists && Object.keys(doc.data()).length > 0) {
          localStorage.setItem(LS_KEY, JSON.stringify(doc.data()));
        }
      }).catch(() => {});
      return mergeWithDefaults(JSON.parse(raw));
    }
  } catch {}
  return DOC_REF.get().then(doc => {
    if (doc.exists && Object.keys(doc.data()).length > 0) {
      const d = mergeWithDefaults(doc.data());
      localStorage.setItem(LS_KEY, JSON.stringify(doc.data()));
      return d;
    }
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }).catch(() => JSON.parse(JSON.stringify(DEFAULT_DATA)));
}

(async () => {
const data = await loadData();
const isBlank = v => v == null || (typeof v === 'string' && (v.trim() === '' || v.trim() === '#'));

// Footer
document.getElementById('footer-name').textContent = `\u00a9 ${new Date().getFullYear()} ${data.info.name || 'Louis Lamprecht'}`;

// Count
const countEl = document.getElementById('gallery-count');
if (data.photos.length > 0) countEl.textContent = `${data.photos.length} images`;

// ── MOBILE NAV ──────────────────────────────────
const menuBtn = document.getElementById('nav-menu-btn');
const overlay = document.getElementById('nav-mobile-overlay');
menuBtn.addEventListener('click', () => overlay.classList.toggle('open'));
window.closeMobileNav = () => overlay.classList.remove('open');

// ── PHOTO GRID + FILTERS ────────────────────────
const photoGrads = [
  ['#1c1510','#0a0806'], ['#0e1218','#080c10'], ['#18120a','#0c0905'],
  ['#101518','#0a0f12'], ['#1a1018','#0d080c'], ['#121810','#090d08'],
  ['#181510','#0c0a08']
];
const photoGrid = document.getElementById('photo-grid');
const photoFilters = document.getElementById('photo-filters');
const tags = data.info.photoTags || [];
let activeFilter = '';

if (tags.length > 0) {
  const allBtn = document.createElement('button');
  allBtn.className = 'photo-filter-btn active';
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', () => { activeFilter = ''; applyFilter(); });
  photoFilters.appendChild(allBtn);
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'photo-filter-btn';
    btn.textContent = tag;
    btn.addEventListener('click', () => { activeFilter = tag; applyFilter(); });
    photoFilters.appendChild(btn);
  });
} else {
  photoFilters.style.display = 'none';
}

data.photos.forEach((photo, i) => {
  const [c1, c2] = photoGrads[i % photoGrads.length];
  const spanClass = photo.span === 'tall' ? 'tall' : photo.span === 'wide' ? 'wide' : '';
  const item = document.createElement('div');
  item.className = `photo-item ${spanClass}`;
  item.dataset.photoTag = photo.tag || '';
  item.dataset.photoIdx = i;

  const vb = photo.span === 'wide' ? '0 0 800 300' : photo.span === 'tall' ? '0 0 400 600' : '0 0 400 300';
  const cx = photo.span === 'wide' ? 400 : 200;
  const cy = photo.span === 'tall' ? 290 : 145;
  const h  = photo.span === 'tall' ? 600 : 300;
  const w  = photo.span === 'wide' ? 800 : 400;

  const imgHtml = photo.src
    ? `<img class="photo-img" src="${photo.src}" alt="${photo.title || ''}">`
    : `<svg class="photo-svg" viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="min-height:240px;display:block;width:100%;height:100%"><defs><linearGradient id="phg${i}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs><rect width="${w}" height="${h}" fill="url(#phg${i})"/><text x="${cx}" y="${cy}" fill="#2a2520" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="3">PHOTO</text><text x="${cx}" y="${cy+18}" fill="#2a2520" font-family="monospace" font-size="8" text-anchor="middle" letter-spacing="2">to be placed</text></svg>`;

  const captionParts = [];
  if (!isBlank(photo.title))    captionParts.push(`<div class="photo-caption-title">${photo.title}</div>`);
  if (!isBlank(photo.location)) captionParts.push(`<div class="photo-caption-loc">${photo.location}</div>`);
  const captionHtml = captionParts.length ? `<div class="photo-caption">${captionParts.join('')}</div>` : '';

  item.innerHTML = `${imgHtml}${captionHtml}`;
  item.addEventListener('click', () => openLightbox(i));
  photoGrid.appendChild(item);
});

function applyFilter() {
  photoFilters.querySelectorAll('.photo-filter-btn').forEach(btn => {
    btn.classList.toggle('active', (btn.textContent === 'All' && activeFilter === '') || btn.textContent === activeFilter);
  });
  photoGrid.querySelectorAll('.photo-item').forEach(item => {
    item.style.display = (activeFilter === '' || item.dataset.photoTag === activeFilter) ? '' : 'none';
  });
  // Update count
  const visible = photoGrid.querySelectorAll('.photo-item:not([style*="display: none"])').length;
  countEl.textContent = `${visible} image${visible !== 1 ? 's' : ''}`;
}

// ── LIGHTBOX ────────────────────────────────────
const plb = document.getElementById('photo-lightbox');
const plbImg = document.getElementById('plb-img');
const plbPlaceholder = document.getElementById('plb-placeholder');
const plbCaption = document.getElementById('plb-caption');
let plbIndex = 0;

function openLightbox(idx) {
  plbIndex = idx;
  showPhoto();
  plb.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function showPhoto() {
  const photo = data.photos[plbIndex];
  if (photo.src) {
    plbImg.src = photo.src; plbImg.style.display = 'block';
    plbPlaceholder.style.display = 'none';
  } else {
    plbImg.style.display = 'none';
    plbPlaceholder.textContent = photo.title || '';
    plbPlaceholder.style.display = 'flex';
  }
  const parts = [];
  if (!isBlank(photo.title))    parts.push(photo.title);
  if (!isBlank(photo.location)) parts.push(photo.location);
  parts.push(`${plbIndex + 1} / ${data.photos.length}`);
  plbCaption.textContent = parts.join('  \u00b7  ');
}

document.getElementById('plb-close').addEventListener('click', () => {
  plb.style.display = 'none';
  document.body.style.overflow = '';
});
plb.addEventListener('click', e => { if (e.target === plb) { plb.style.display = 'none'; document.body.style.overflow = ''; } });
document.getElementById('plb-prev').addEventListener('click', () => { plbIndex = (plbIndex - 1 + data.photos.length) % data.photos.length; showPhoto(); });
document.getElementById('plb-next').addEventListener('click', () => { plbIndex = (plbIndex + 1) % data.photos.length; showPhoto(); });
document.addEventListener('keydown', e => {
  if (plb.style.display !== 'flex') return;
  if (e.key === 'Escape') { plb.style.display = 'none'; document.body.style.overflow = ''; }
  if (e.key === 'ArrowLeft') { plbIndex = (plbIndex - 1 + data.photos.length) % data.photos.length; showPhoto(); }
  if (e.key === 'ArrowRight') { plbIndex = (plbIndex + 1) % data.photos.length; showPhoto(); }
});

})();
</script>
</body>
</html>
